# Scrapes dokan's Prometheus endpoint. dokan runs on the host; the 5s interval matches
# dokan's internal gauge sampler so queue-depth/series resolution line up.
global:
  scrape_interval: 5s
  evaluation_interval: 15s

scrape_configs:
  - job_name: dokan
    metrics_path: /metrics
    static_configs:
      - targets: ["host.docker.internal:8088"]
        labels:
          instance: "dokan-local"
    # dokan's /metrics sits behind the same optional bearer gate as the operator UI.
    # If you start dokan with --token / DOKAN_TOKEN, uncomment and set the credentials:
    # authorization:
    #   type: Bearer
    #   credentials: "YOUR_DOKAN_TOKEN"
