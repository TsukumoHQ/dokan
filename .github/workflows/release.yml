name: Release

# Tag pushes (vX.Y.Z) build the platform binaries and publish them, plus a SHA256SUMS, to the
# GitHub Release for the tag. These are exactly the assets `dokan update` downloads + verifies:
# asset name = `dokan-<rust-target-triple>` (see src/update.rs::asset_name_for).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # All 4 supported triples (src/update.rs::asset_name_for) — each on a NATIVE runner so no
        # cross toolchain is needed. Missing the Intel-mac / arm-Linux assets left those users with
        # no working install (install.sh dies "unsupported"); TSU-224.
        include:
          - os: macos-14            # Apple Silicon
            target: aarch64-apple-darwin
          - os: macos-13            # Intel mac
            target: x86_64-apple-darwin
          - os: ubuntu-latest       # x86_64 Linux
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-24.04-arm    # arm64 Linux (GitHub-hosted arm runner)
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Rename to platform asset name
        run: cp "target/${{ matrix.target }}/release/dokan" "dokan-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: dokan-${{ matrix.target }}
          path: dokan-${{ matrix.target }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect assets + generate SHA256SUMS
        run: |
          mkdir -p out
          # download-artifact nests each artifact under dist/<name>/; flatten to out/.
          find dist -type f -name 'dokan-*' -exec cp {} out/ \;
          cd out
          # `<hexdigest>  <basename>` lines — the exact format src/update.rs parses.
          shasum -a 256 dokan-* > SHA256SUMS
          echo "Published assets:"
          cat SHA256SUMS

      - name: Publish to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            out/dokan-*
            out/SHA256SUMS
