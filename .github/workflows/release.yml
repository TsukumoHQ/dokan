name: Release

# Tag pushes (vX.Y.Z) build the platform binaries and publish them, plus a SHA256SUMS, to the
# GitHub Release for the tag. These are exactly the assets `dokan update` downloads + verifies:
# asset name = `dokan-<rust-target-triple>` (see src/update.rs::asset_name_for).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  build:
    name: build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        # All 4 supported triples (src/update.rs::asset_name_for). macOS cross-compiles on the
        # plentiful Apple-Silicon macos-14 (kills the scarce macos-13 queue). Linux builds on
        # ubuntu-22.04 (glibc 2.35) NOT ubuntu-latest/24.04 (glibc 2.39) — a 2.39 binary won't run
        # on Debian 12 / Ubuntu 22.04 (the install-gate caught exactly this). TSU-224.
        include:
          - os: macos-14            # Apple Silicon (native)
            target: aarch64-apple-darwin
          - os: macos-14            # Apple Silicon → cross-compile Intel (no native macos-13 dep)
            target: x86_64-apple-darwin
          - os: ubuntu-22.04        # x86_64 Linux — glibc 2.35 floor for broad portability
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-22.04-arm    # arm64 Linux — glibc 2.35 floor
            target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo + target
        uses: Swatinem/rust-cache@v2

      - name: Build release binary
        run: cargo build --release --locked --target ${{ matrix.target }}

      - name: Rename to platform asset name
        run: cp "target/${{ matrix.target }}/release/dokan" "dokan-${{ matrix.target }}"

      - uses: actions/upload-artifact@v4
        with:
          name: dokan-${{ matrix.target }}
          path: dokan-${{ matrix.target }}
          if-no-files-found: error

  # Install gate (TSU-224): install the JUST-BUILT linux binary on a LEAN base with no libssl and
  # assert it runs + the skill lands. A red gate BLOCKS the release (the publish job needs it), so
  # a binary that "builds but won't run on a clean box" never ships.
  gate:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Download the x86_64 linux binary
        uses: actions/download-artifact@v4
        with:
          name: dokan-x86_64-unknown-linux-gnu
          path: gate
      - name: Install-gate on a lean image (portability proof)
        run: |
          cp gate/dokan-x86_64-unknown-linux-gnu dokan-gate-bin
          docker build -f install-smoke/dokan-release-gate.Dockerfile \
            --build-arg TAG="${GITHUB_REF_NAME}" -t dokan-release-gate .

  release:
    needs: [build, gate]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download built binaries
        uses: actions/download-artifact@v4
        with:
          path: dist

      - name: Collect assets + generate SHA256SUMS
        run: |
          mkdir -p out
          # download-artifact nests each artifact under dist/<name>/; flatten to out/.
          find dist -type f -name 'dokan-*' -exec cp {} out/ \;
          cd out
          # `<hexdigest>  <basename>` lines — the exact format src/update.rs parses.
          shasum -a 256 dokan-* > SHA256SUMS
          echo "Published assets:"
          cat SHA256SUMS

      # Sign SHA256SUMS with the Ed25519 release-signing key so the updater can verify provenance,
      # not just integrity (TSU-252). No-op until DOKAN_RELEASE_SIGNING_KEY (an Ed25519 private-key
      # PEM, `openssl genpkey -algorithm ed25519`) is configured as a repo secret. Output is base64
      # of the raw 64-byte signature — exactly what src/update.rs::ed25519_verify_detached expects.
      - name: Sign SHA256SUMS (Ed25519)
        env:
          SIGNING_KEY: ${{ secrets.DOKAN_RELEASE_SIGNING_KEY }}
        run: |
          if [ -z "$SIGNING_KEY" ]; then
            echo "DOKAN_RELEASE_SIGNING_KEY not set — skipping SHA256SUMS.sig (checksum-only release)."
            exit 0
          fi
          printf '%s' "$SIGNING_KEY" > /tmp/release_key.pem
          openssl pkeyutl -sign -inkey /tmp/release_key.pem -rawin -in out/SHA256SUMS -out /tmp/sig.bin
          base64 -w0 /tmp/sig.bin > out/SHA256SUMS.sig
          rm -f /tmp/release_key.pem
          echo "Signed SHA256SUMS -> out/SHA256SUMS.sig"

      - name: Publish to the GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          # `-rc` tags publish as a PRERELEASE so they never become "Latest" (install.sh resolves
          # via /releases/latest, which skips prereleases). Real cuts (no `-rc`) publish normally.
          prerelease: ${{ contains(github.ref_name, '-rc') }}
          # SHA256SUMS.sig is published only when the signing key is configured (missing files are
          # skipped — action-gh-release does not fail on an unmatched path).
          files: |
            out/dokan-*
            out/SHA256SUMS
            out/SHA256SUMS.sig
